<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduTask</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f7f4fb; color: #2b0d3e; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { background: #fff; border: 1px solid #e8ddf0; border-radius: 14px; padding: 24px; max-width: 560px; width: 100%; box-shadow: 0 10px 30px rgba(43,13,62,0.08); }
      h1 { margin: 0 0 8px; color: #7a3f91; }
      p { margin: 0 0 16px; line-height: 1.5; }
      a { display: inline-block; background: #7a3f91; color: #fff; text-decoration: none; padding: 10px 16px; border-radius: 10px; font-weight: 600; }
      code { background: #f2eaf7; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>EduTask</h1>
        <p>This repository uses a monorepo layout. Start the full stack with <code>npm run dev</code> from <code>D:\Edutask</code>.</p>
        <a href="http://127.0.0.1:3000">Open Frontend</a>
      </div>
    </div>
  </body>
</html>
