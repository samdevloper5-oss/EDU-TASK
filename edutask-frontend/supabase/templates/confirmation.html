<div style="font-family: 'DM Sans', system-ui, sans-serif; max-width: 480px; margin: 0 auto; padding: 40px 24px; background: #F8F8F7;">
  <div style="margin-bottom: 32px;">
    <div style="width: 32px; height: 32px; background: #4F46E5; border-radius: 8px; display: inline-block;"></div>
    <span style="font-size: 18px; font-weight: 700; color: #0F0F0F; vertical-align: middle; margin-left: 10px;">EduTask</span>
  </div>
  <h1 style="font-size: 24px; font-weight: 700; color: #0F0F0F; margin: 0 0 8px;">Your verification code</h1>
  <p style="font-size: 15px; color: #6B6B6B; margin: 0 0 32px; line-height: 1.6;">Enter this 6-digit code to verify your EduTask account. It expires in 60 minutes.</p>
  <div style="font-size: 48px; font-weight: 700; letter-spacing: 12px; color: #4F46E5; font-family: 'Courier New', monospace; background: #fff; border: 1px solid #E5E5E3; border-radius: 12px; padding: 20px; text-align: center;">{{ .Token }}</div>
  <p style="font-size: 13px; color: #A3A3A3; margin-top: 32px;">If you did not sign up for EduTask, ignore this email. Do not share this code.</p>
</div>
